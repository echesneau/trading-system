name: Setup Python
runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup UV
      uses: astral-sh/setup-uv@v6
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.python-version }}
        cache: uv
    - name: Install dependencies
      run: uv sync --extra dev --extra test
      shell: bash