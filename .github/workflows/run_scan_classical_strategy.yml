name: Dayly Classical Strategy Scan

on:
  schedule:
    - cron: '0 16 * * 1-5'
  workflow_dispatch:      # Exécution manuelle

jobs:
  validate-classical-strategies:
    runs-on: ubuntu-22.04
    env:
      REAL_EMAIL_SMTP_SERVER: ${{ secrets.REAL_EMAIL_SMTP_SERVER }}
      REAL_EMAIL_SMTP_PORT: ${{ secrets.REAL_EMAIL_SMTP_PORT }}
      REAL_EMAIL_LOGIN: ${{ secrets.REAL_EMAIL_LOGIN }}
      REAL_EMAIL_PASSWORD: ${{ secrets.REAL_EMAIL_PASSWORD }}
      REAL_EMAIL_TO_PROD: ${{ secrets.REAL_EMAIL_TO_PROD }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        lfs: true

    - uses: ./.github/actions/setup-python

    - name: Run validation
      run: uv run python scripts/run_classical_scan.py
