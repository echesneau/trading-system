# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

env:
  PYTHON_VERSION: "3.10"

jobs:
  unit-test:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Important pour setuptools-scm
      - name: Setup UV
        uses: astral-sh/setup-uv@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
            python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          uv sync --extra dev --extra test
      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ -v --no-cov

  integration-test:
    name: Integration tests
    runs-on: ubuntu-22.04
    needs: unit-test
    env:
      REAL_EMAIL_SMTP_SERVER: ${{ secrets.REAL_EMAIL_SMTP_SERVER }}
      REAL_EMAIL_SMTP_PORT: ${{ secrets.REAL_EMAIL_SMTP_PORT }}
      REAL_EMAIL_LOGIN: ${{ secrets.REAL_EMAIL_LOGIN }}
      REAL_EMAIL_PASSWORD: ${{ secrets.REAL_EMAIL_PASSWORD }}
      REAL_EMAIL_TO: ${{ secrets.REAL_EMAIL_TO }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Important pour setuptools-scm
          lfs: true
      - name: Setup UV
        uses: astral-sh/setup-uv@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          uv sync --extra dev --extra test
      - name: Run tests
        run: |
          uv run pytest tests/integration/ -v  --no-cov

  coverage:
    name: All tests with coverage
    runs-on: ubuntu-22.04
    needs: [unit-test, integration-test]
    env:
      REAL_EMAIL_SMTP_SERVER: ${{ secrets.REAL_EMAIL_SMTP_SERVER }}
      REAL_EMAIL_SMTP_PORT: ${{ secrets.REAL_EMAIL_SMTP_PORT }}
      REAL_EMAIL_LOGIN: ${{ secrets.REAL_EMAIL_LOGIN }}
      REAL_EMAIL_PASSWORD: ${{ secrets.REAL_EMAIL_PASSWORD }}
      REAL_EMAIL_TO: ${{ secrets.REAL_EMAIL_TO }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Important pour setuptools-scm
          lfs: true
      - name: Setup UV
        uses: astral-sh/setup-uv@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          uv sync --extra dev --extra test
      - name: Run all tests with coverage
        run: |
          uv run pytest tests/ -v --cov=trading_system --cov-report=xml --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: tests
          name: codecov-umbrella

  compatibility-test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    needs: [unit-test, integration-test, coverage]
    env:
      REAL_EMAIL_SMTP_SERVER: ${{ secrets.REAL_EMAIL_SMTP_SERVER }}
      REAL_EMAIL_SMTP_PORT: ${{ secrets.REAL_EMAIL_SMTP_PORT }}
      REAL_EMAIL_LOGIN: ${{ secrets.REAL_EMAIL_LOGIN }}
      REAL_EMAIL_PASSWORD: ${{ secrets.REAL_EMAIL_PASSWORD }}
      REAL_EMAIL_TO: ${{ secrets.REAL_EMAIL_TO }}
      GITHUB_SHA: ${{ github.sha }}
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-22.04]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Important pour setuptools-scm
        lfs: true
    - name: Setup UV
      uses: astral-sh/setup-uv@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        uv sync --extra dev --extra test
    - name: Run all tests
      run: |
        uv run pytest tests/ -v --tb=short

  lint:
    name: Linting and Code Quality
    runs-on: ubuntu-22.04
    needs: [unit-test, integration-test, coverage, compatibility-test]
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup UV
      uses: astral-sh/setup-uv@v6
    - name: Set up Python ${{ env.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.python-version }}
    - name: Run flake8 (warning only)
      run: |
        uv run flake8 src/ --max-line-length=88 --extend-ignore=E203,E501 || echo "⚠️ flake8 issues found"

    - name: Run black check (warning only)
      run: |
        uv run black --check src/ tests/ || echo "⚠️ black formatting issues found"

    - name: Run isort check (warning only)
      run: |
        uv run isort --check-only src/ tests/ || echo "⚠️ isort issues found"

    - name: Run mypy (warning only)
      run: |
        uv run mypy src/ --ignore-missing-imports || echo "⚠️ mypy type issues found"

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    needs: [unit-test, integration-test, coverage, compatibility-test]
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup UV
      uses: astral-sh/setup-uv@v6
    - name: Set up Python ${{ env.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.python-version }}

    - name: Install security tools
      run: |
        uv add pip-audit bandit

    - name: Run pip-audit
      run: |
        uv run pip-audit

    - name: Run bandit
      run: |
        uv run bandit -r src/ -ll

  build:
    name: Build Package
    runs-on: ubuntu-22.04
    needs: [unit-test, integration-test, coverage, compatibility-test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup UV
      uses: astral-sh/setup-uv@v6
    - name: Set up Python ${{ env.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.python-version }}

    - name: Build package
      run: |
        uv build
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: trading-system-package
        path: dist/


